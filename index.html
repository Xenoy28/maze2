<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Labyrinthe à Bille</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff;overflow:hidden;font-family:monospace;}
#gc{width:100%;position:relative;touch-action:none;background:#ffffff;}
#gc canvas{display:block;width:100%;}
.panel{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:rgba(255,255,255,0.92);}
.panel h2{color:#2c3dd6;font-size:22px;font-weight:700;margin:0;letter-spacing:.04em;}
.panel p{color:#555;font-size:12px;margin:0;text-align:center;padding:0 1.5rem;}
.btn{padding:10px 32px;border:2px solid #3dd6c8;background:transparent;color:#2c3dd6;font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:background .2s,color .2s;}
.btn:hover,.btn:active{background:#3dd6c8;color:#fff;}
#hud{position:absolute;top:12px;left:14px;display:none;color:#2c3dd6;font-size:11px;letter-spacing:.08em;font-family:monospace;}
#tilt-indicator{position:absolute;bottom:14px;right:14px;width:48px;height:48px;display:none;}
#wo{display:none;flex-direction:column;}
#gyro-status{font-size:10px;padding:4px 10px;border-radius:4px;margin-top:4px;display:none;}
#gyro-btn{padding:8px 20px;border:1.5px solid #e63946;background:transparent;color:#e63946;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;display:none;}
#gyro-sens-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;margin-top:2px;}
#gyro-sens-wrap label{font-size:11px;color:#555;letter-spacing:.06em;}
#gyro-sens-wrap input[type=range]{width:160px;accent-color:#3dd6c8;cursor:pointer;}
#gyro-sens-val{font-size:11px;color:#2c3dd6;font-weight:700;}
#hud-sens-row{display:flex;align-items:center;gap:6px;margin-top:2px;}
#hud-sens-row label{font-size:10px;color:#2c3dd6;}
#hud-sens-slider{width:80px;accent-color:#3dd6c8;cursor:pointer;}
</style>
</head>
<body>
<div id="gc">
  <canvas id="c"></canvas>

  <div class="panel" id="overlay">
    <h2>Labyrinthe à Bille</h2>
    <p>PC — glisser la souris · Mobile — incliner le téléphone ou glisser le doigt</p>
    <button class="btn" id="start-btn">Commencer</button>
    <button id="gyro-btn">Activer le gyroscope</button>
    <div id="gyro-status"></div>
    <div id="gyro-sens-wrap">
      <label for="gyro-sens">Sensibilité gyroscope</label>
      <div style="display:flex;align-items:center;gap:8px;">
        <input type="range" id="gyro-sens" min="4" max="40" value="16" step="1">
        <span id="gyro-sens-val">1.0×</span>
      </div>
    </div>
  </div>

  <div class="panel" id="wo" style="display:none;">
    <h2>Arrivée !</h2>
    <p id="win-time">Temps : 00:00</p>
    <button class="btn" id="restart-btn">Rejouer</button>
  </div>

  <div id="hud">
  <label style="display:flex;align-items:center;gap:6px;cursor:pointer;margin-bottom:4px;">
    <input type="checkbox" id="invert-chk" style="width:13px;height:13px;accent-color:#2c3dd6;">
    <span>Inverser</span>
  </label>
    <div>TEMPS — <span id="timer">00:00</span></div>
    <div>TILT X <span id="hud-tx">0.00</span> Z <span id="hud-tz">0.00</span></div>
    <div>GYRO <span id="hud-gyro">—</span></div>
    <div id="hud-sens-row">
      <label for="hud-sens-slider">SENS</label>
      <input type="range" id="hud-sens-slider" min="4" max="40" value="16" step="1">
      <span id="hud-sens-val">1.0×</span>
    </div>
  </div>

  <svg id="tilt-indicator" viewBox="0 0 48 48" style="display:none;">
    <circle cx="24" cy="24" r="22" fill="none" stroke="#3dd6c8" stroke-width="1" opacity="0.5"/>
    <circle id="tilt-dot" cx="24" cy="24" r="3" fill="#3dd6c8"/>
  </svg>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ─── GYRO SENSITIVITY ─────────────────────────────────────────────────────────
let gyroSensMultiplier = 1.0;
const GYRO_BASE_SENS = 0.006; // réduit car on utilise les degrés directement → rad

function updateSensDisplay(val){
  // val 4→40, 16=1.0×
  const mult = (val / 16).toFixed(2);
  gyroSensMultiplier = parseFloat(mult);
  document.getElementById('gyro-sens-val').textContent = mult + '×';
  document.getElementById('hud-sens-val').textContent = mult + '×';
  document.getElementById('gyro-sens').value = val;
  document.getElementById('hud-sens-slider').value = val;
}

document.getElementById('gyro-sens').addEventListener('input', e => updateSensDisplay(+e.target.value));
document.getElementById('hud-sens-slider').addEventListener('input', e => updateSensDisplay(+e.target.value));


let invertControls = false;
document.getElementById('invert-chk').addEventListener('change', function(){
  invertControls = this.checked;
});
// ─── GYROSCOPE ────────────────────────────────────────────────────────────────
let gyroEnabled = false, gyroGranted = false, gyroActive = false;
let betaOffset = 0, gammaOffset = 0;
let tTiltX = 0, tTiltZ = 0;
let gyroListenerAttached = false;
const DEG_GYRO = Math.PI / 180; // pour le gestionnaire gyroscope

const gyroStatus = document.getElementById('gyro-status');
const gyroBtn    = document.getElementById('gyro-btn');

function showGyroStatus(msg, color){
  gyroStatus.textContent = msg;
  gyroStatus.style.background = color || '#eef';
  gyroStatus.style.color = '#2c3dd6';
  gyroStatus.style.display = 'block';
}

function onDeviceOrientation(e){
  if(!running) return;
  if(e.beta === null && e.gamma === null) return;
  const beta  = e.beta  || 0;
  const gamma = e.gamma || 0;
  if(!gyroActive){
    betaOffset  = beta;
    gammaOffset = gamma;
    gyroActive  = true;
    showGyroStatus('Gyroscope actif ✓', '#d0faf7');
    gyroStatus.style.color = '#0a7a6e';
  }
  // En mode PORTRAIT, le téléphone est tenu vertical (beta ≈ 90° au repos)
  // Incliner vers soi (bas écran vers bas) → beta diminue depuis 90°
  // Incliner à gauche/droite → gamma change (−90 à +90°)
  const relBeta  = beta  - betaOffset;   // inclinaison avant/arrière
  const relGamma = gamma - gammaOffset;  // inclinaison gauche/droite
  const maxTilt = 0.44;
  const sens = gyroSensMultiplier;
  const sg = invertControls ? -1 : 1;
  // Portrait : gamma → axe Z (gauche/droite visuel), beta → axe X (haut/bas visuel)
  tTiltZ = Math.max(-maxTilt, Math.min(maxTilt,  sg * relGamma * DEG_GYRO * sens));
  tTiltX = Math.max(-maxTilt, Math.min(maxTilt,  sg * relBeta  * DEG_GYRO * sens));
  gyroEnabled = true;
}

function attachGyroListener(){
  if(gyroListenerAttached) return;
  window.addEventListener('deviceorientation', onDeviceOrientation, true);
  gyroListenerAttached = true;
  setTimeout(()=>{
    if(!gyroActive && running){
      showGyroStatus('Gyroscope non détecté — glisser pour jouer', '#fff0cc');
      gyroStatus.style.color = '#a06000';
    }
  }, 2000);
}

function tryAndroidDirect(){
  let testReceived = false;
  function testHandler(e){
    if(e.beta !== null || e.gamma !== null) testReceived = true;
    window.removeEventListener('deviceorientation', testHandler, true);
  }
  window.addEventListener('deviceorientation', testHandler, true);
  setTimeout(()=>{
    if(!testReceived){ gyroBtn.style.display = 'block'; showGyroStatus('Appuyez sur "Activer le gyroscope"', '#fff0cc'); gyroStatus.style.color = '#a06000'; }
  }, 800);
}

function initGyro(){
  const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if(typeof DeviceOrientationEvent !== 'undefined'){
    if(typeof DeviceOrientationEvent.requestPermission === 'function'){
      gyroBtn.style.display = 'block';
      showGyroStatus('iOS : appuyez sur "Activer le gyroscope"', '#eef0ff');
    } else {
      gyroGranted = true;
      attachGyroListener();
      if(!isIOS) tryAndroidDirect();
    }
  } else {
    showGyroStatus('Gyroscope non supporté — glisser pour jouer', '#ffeaea');
    gyroStatus.style.color = '#c00';
  }
}

gyroBtn.addEventListener('click', ()=>{
  if(typeof DeviceOrientationEvent.requestPermission === 'function'){
    DeviceOrientationEvent.requestPermission().then(state => {
      if(state === 'granted'){
        gyroGranted = true;
        attachGyroListener();
        showGyroStatus('Gyroscope iOS autorisé ✓', '#d0faf7');
        gyroStatus.style.color = '#0a7a6e';
        gyroBtn.style.display = 'none';
      } else {
        showGyroStatus('Permission refusée — glisser pour jouer', '#ffeaea');
        gyroStatus.style.color = '#c00';
      }
    }).catch(()=>{ showGyroStatus('Erreur permission', '#ffeaea'); });
  } else {
    gyroGranted = true;
    attachGyroListener();
    gyroBtn.style.display = 'none';
    showGyroStatus('Gyroscope activé ✓', '#d0faf7');
    gyroStatus.style.color = '#0a7a6e';
  }
});

initGyro();

// ─── THREE.JS ────────────────────────────────────────────────────────────────
const cont = document.getElementById('gc');
const cvs  = document.getElementById('c');
const W = () => cont.clientWidth;
const H = () => Math.min(W(), 580);

const renderer = new THREE.WebGLRenderer({canvas: cvs, antialias: true});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0xffffff, 1);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);
scene.fog = new THREE.FogExp2(0xffffff, 0.025);

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
camera.position.set(0, 16, 10);
camera.lookAt(0, 0, 0);

function resize(){
  const w = W(), h = H();
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
resize();
window.addEventListener('resize', resize);

scene.add(new THREE.AmbientLight(0xffffff, 1.1));
const dir = new THREE.DirectionalLight(0xffffff, 0.7);
dir.position.set(4, 14, 6);
dir.castShadow = true;
dir.shadow.mapSize.set(1024,1024);
dir.shadow.camera.left=-12; dir.shadow.camera.right=12;
dir.shadow.camera.top=12;   dir.shadow.camera.bottom=-12;
scene.add(dir);
const pt1 = new THREE.PointLight(0x3dd6c8, 0.4, 20);
pt1.position.set(0, 6, 0);
scene.add(pt1);

const TEAL=0x3dd6c8, BLUE=0x2c3dd6, BGLIGHT=0xeef0f5, BGFLOOR=0xf5f7fa, WALL=0x3dd6c8;
const MAT_BOARD  = new THREE.MeshLambertMaterial({color: BGLIGHT});
const MAT_FLOOR  = new THREE.MeshLambertMaterial({color: BGFLOOR});
const MAT_WALL   = new THREE.MeshLambertMaterial({color: WALL, emissive: TEAL, emissiveIntensity: 0.12});
const MAT_BALL   = new THREE.MeshStandardMaterial({color: BLUE, metalness:0.6, roughness:0.2, emissive:0x1a2580, emissiveIntensity:0.15});
const MAT_EDGE   = new THREE.MeshLambertMaterial({color: TEAL, emissive: TEAL, emissiveIntensity: 0.25});
const MAT_START  = new THREE.MeshLambertMaterial({color:0xd0faf7, emissive: TEAL, emissiveIntensity:0.3, transparent:true, opacity:0.9});
const MAT_FINISH = new THREE.MeshLambertMaterial({color:0xffd6d6, emissive:0xe63946, emissiveIntensity:0.35, transparent:true, opacity:0.9});

// ─── PLATEAU CIRCULAIRE ──────────────────────────────────────────────────────
const BOARD_R = 5.0;   // rayon du plateau
const BT = 0.3;
const WH = 0.42;       // hauteur des murs
const WT = 0.12;       // épaisseur des murs

const boardGroup = new THREE.Group();
scene.add(boardGroup);

// Plateau rond
const baseGeo = new THREE.CylinderGeometry(BOARD_R + 0.7, BOARD_R + 0.7, BT, 64);
const base = new THREE.Mesh(baseGeo, MAT_BOARD);
base.receiveShadow = true;
boardGroup.add(base);

const floorGeo = new THREE.CylinderGeometry(BOARD_R, BOARD_R, 0.04, 64);
const floor = new THREE.Mesh(floorGeo, MAT_FLOOR);
floor.position.y = BT/2+0.02;
floor.receiveShadow = true;
boardGroup.add(floor);

// Bordure extérieure circulaire (anneau complet)
const edgeGeo = new THREE.TorusGeometry(BOARD_R + 0.35, 0.35, 8, 64);
const edge = new THREE.Mesh(edgeGeo, MAT_EDGE);
edge.rotation.x = Math.PI/2;
edge.position.y = BT/2 - 0.1;
boardGroup.add(edge);

// Motif décoratif sol (points en cercle)
for(let ring=1; ring<=4; ring++){
  const numDots = ring * 8;
  for(let i=0; i<numDots; i++){
    const a = (i/numDots) * Math.PI * 2;
    const rr = ring * 1.0;
    const d = new THREE.Mesh(
      new THREE.CylinderGeometry(0.03,0.03,0.05,6),
      new THREE.MeshLambertMaterial({color:0xc8eceb})
    );
    d.position.set(rr * Math.cos(a), BT/2+0.04, rr * Math.sin(a));
    boardGroup.add(d);
  }
}

const floorY = BT/2+0.02;
const wallY  = floorY + WH/2;

// ─── ANNEAUX DE LABYRINTHE ────────────────────────────────────────────────────
// Chaque anneau = un seul tube continu (TubeGeometry sur EllipseCurve)
// avec une seule coupure nette = le gap

const DEG = Math.PI / 180;

const MAZE_RINGS = [
  { r: 4.10, gapCenter:  126.5, gapHalf: 14 },
  { r: 3.05, gapCenter:  -53.5, gapHalf: 14 },
  { r: 2.00, gapCenter:  140.0, gapHalf: 18 },
  { r: 1.00, gapCenter:  -90.0, gapHalf: 22 },
];

const ARC_WALLS = [];

// Segments de collision (like labyrinthe carré)
const WALL_SEGS = []; // {cx, cz, ry, hw, hd} — demi-largeur / demi-profondeur

function buildRingWall(r3d, gapCenter_deg, gapHalf_deg) {
  const gapStart_rad = (gapCenter_deg - gapHalf_deg) * DEG;
  const gapEnd_rad   = (gapCenter_deg + gapHalf_deg) * DEG;
  const gapTotal = 2 * gapHalf_deg * DEG;
  const arcAngleStart = gapEnd_rad;
  const arcAngleEnd   = gapEnd_rad + (Math.PI * 2 - gapTotal);

  const arcDeg = 360 - 2 * gapHalf_deg;
  const numPts = Math.max(80, Math.round(arcDeg * 1.5));

  const curve = new THREE.EllipseCurve(0,0,r3d,r3d, arcAngleStart, arcAngleEnd, false);
  const points2D = curve.getPoints(numPts);
  const points3D = points2D.map(p => new THREE.Vector3(p.x, 0, p.y));

  // Stocker chaque segment pour la collision
  for(let i = 0; i < points3D.length - 1; i++){
    const a = points3D[i], b = points3D[i+1];
    const mx = (a.x+b.x)/2, mz = (a.z+b.z)/2;
    const dx = b.x-a.x, dz = b.z-a.z;
    const len = Math.sqrt(dx*dx+dz*dz);
    const angle = Math.atan2(dz, dx); // angle du segment
    WALL_SEGS.push({ cx:mx, cz:mz, ry:angle, hw:(len/2)+0.02, hd: WT/2 });
  }

  const path = new THREE.CatmullRomCurve3(points3D, false, 'catmullrom', 0);
  const geo = new THREE.TubeGeometry(path, numPts, WT/2, 6, false);
  const mesh = new THREE.Mesh(geo, MAT_WALL);
  mesh.position.set(0, wallY, 0);
  mesh.castShadow = true; mesh.receiveShadow = true;
  boardGroup.add(mesh);

  return { r: r3d, gapStart: gapStart_rad, gapEnd: gapEnd_rad };
}

MAZE_RINGS.forEach(({ r, gapCenter, gapHalf }) => {
  ARC_WALLS.push(buildRingWall(r, gapCenter, gapHalf));
});

// ─── MARQUEURS START / FINISH ─────────────────────────────────────────────────
// Start : entre ring 1 (r=4.10) et le bord (r=5.0), à l'angle opposé au gap de ring1
// L'angle opposé au gap ring1 (126.5°) = 126.5 - 180 = -53.5°
const startAngle = (126.5 - 180) * DEG;
const startR = 4.55;
const START_X = startR * Math.cos(startAngle);
const START_Z = startR * Math.sin(startAngle);

const startM = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 0.05, 24), MAT_START);
startM.position.set(START_X, floorY+0.04, START_Z);
boardGroup.add(startM);

const finishM = new THREE.Mesh(new THREE.CylinderGeometry(0.35, 0.35, 0.05, 24), MAT_FINISH);
finishM.position.set(0, floorY+0.04, 0);
boardGroup.add(finishM);

[[START_X, START_Z, TEAL], [0, 0, 0xe63946]].forEach(([cx,cz,col])=>{
  const light = new THREE.PointLight(col, 0.3, 2.0);
  light.position.set(cx, floorY+0.3, cz);
  boardGroup.add(light);
});


// ─── GRAPHICS (décorations visuelles, pas de collision) ──────────────────────
// Rendu via CanvasTexture générée depuis le SVG du groupe #graphics
(function(){
  const SIZE = 512;
  const cv = document.createElement('canvas');
  cv.width = cv.height = SIZE;
  const ctx = cv.getContext('2d');

  // Fond transparent
  ctx.clearRect(0,0,SIZE,SIZE);

  // Dessiner les éléments du groupe graphics du SVG
  // Coordonnées SVG viewBox 0 0 400 400 → canvas 512x512
  const s = SIZE / 400;

  // Helper ellipse avec transform
  function ellipse(cx,cy,rx,ry, angleDeg, fill){
    ctx.save();
    ctx.translate(cx*s, cy*s);
    ctx.rotate(angleDeg * Math.PI/180);
    ctx.beginPath();
    ctx.ellipse(0,0,rx*s,ry*s,0,0,Math.PI*2);
    ctx.fillStyle = fill;
    ctx.globalAlpha = 0.55;
    ctx.fill();
    ctx.restore();
  }

  // Les 3 ellipses du groupe graphics
  ellipse(69.29,  166.06, 49.02, 75.43,   0,     '#ebeeff');
  ellipse(263.67, 313.28, 75.43, 49.02, -41.93,  '#ebeeff');
  ellipse(261.76, 97.87,  49.02, 75.43, -67.57,  '#ebeeff');

  // L'arc décoratif (path) du groupe graphics — on le dessine simplement
  ctx.save();
  ctx.globalAlpha = 0.6;
  ctx.strokeStyle = '#25dccc';
  ctx.lineWidth = 6 * s;
  ctx.lineCap = 'round';
  // Arc M177.7,228.74 ... (arc de cercle, centre ~198.49,200.05 r~35)
  // On trace juste un arc approximatif
  const acx = 198.49 * s, acy = 200.05 * s, ar = 35.43 * s;
  ctx.beginPath();
  // gap de -125.9° à -62.9° (en SVG Y vers le bas)
  // On trace l'arc de -62.9° à -125.9°+360° = 234.1° (le reste du cercle)
  ctx.arc(acx, acy, ar, (-62.9)*Math.PI/180, (-125.9+360)*Math.PI/180, false);
  ctx.fillStyle = '#dbeee3';
  ctx.globalAlpha = 0.4;
  ctx.fill();
  ctx.globalAlpha = 0.6;
  ctx.stroke();
  ctx.restore();

  // Créer la texture Three.js
  const tex = new THREE.CanvasTexture(cv);
  tex.rotation = -Math.PI/2;    // aligner avec l'orientation 3D (Z vers le haut = SVG Y inversé)
  tex.center.set(0.5, 0.5);

  // Plan à plat sur le sol du plateau
  const deco = new THREE.Mesh(
    new THREE.PlaneGeometry(10, 10),
    new THREE.MeshBasicMaterial({map: tex, transparent: true, opacity: 0.7, depthWrite: false})
  );
  deco.rotation.x = -Math.PI/2;
  deco.position.y = floorY + 0.025; // juste au-dessus du sol, sous les murs
  boardGroup.add(deco);
})();

// ─── BILLE ────────────────────────────────────────────────────────────────────
const BALL_Y = BT/2+0.02+0.2;
const ball = new THREE.Mesh(new THREE.SphereGeometry(0.2, 24, 24), MAT_BALL);
ball.castShadow = true;
boardGroup.add(ball);
const ballLight = new THREE.PointLight(BLUE, 0.5, 2.5);
boardGroup.add(ballLight);

let bx = START_X, bz = START_Z, vx=0, vz=0;
let tiltX=0, tiltZ=0;
let running=false, won=false, startTime=0;
ball.position.set(bx, BALL_Y, bz);

// ─── SOURIS ──────────────────────────────────────────────────────────────────
let md=false, lmx=0, lmy=0;
cvs.addEventListener('mousedown', e=>{if(running){md=true;lmx=e.clientX;lmy=e.clientY;cvs.style.cursor='crosshair';}});
window.addEventListener('mouseup', ()=>{md=false;cvs.style.cursor='default';});
window.addEventListener('mousemove', e=>{
  if(!md||!running) return;
  const dx=e.clientX-lmx, dy=e.clientY-lmy;
  lmx=e.clientX; lmy=e.clientY;
  const sg2 = invertControls ? -1 : 1;
  tTiltZ = Math.max(-0.32, Math.min(0.32, tTiltZ + sg2*dy*0.011));
  tTiltX = Math.max(-0.32, Math.min(0.32, tTiltX + sg2*dx*0.011));
});

// ─── TACTILE ─────────────────────────────────────────────────────────────────
let ts=null;
cvs.addEventListener('touchstart', e=>{
  if(running) ts={x:e.touches[0].clientX, y:e.touches[0].clientY};
},{passive:true});
cvs.addEventListener('touchmove', e=>{
  if(!ts||!running) return;
  e.preventDefault();
  if(gyroEnabled) return;
  const dx=e.touches[0].clientX-ts.x, dy=e.touches[0].clientY-ts.y;
  ts={x:e.touches[0].clientX, y:e.touches[0].clientY};
  const sg3 = invertControls ? -1 : 1;
  tTiltZ = Math.max(-0.32, Math.min(0.32, tTiltZ + sg3*dy*0.011));
  tTiltX = Math.max(-0.32, Math.min(0.32, tTiltX + sg3*dx*0.011));
},{passive:false});

// ─── PHYSIQUE ─────────────────────────────────────────────────────────────────
const BALL_R = 0.2;

function collide(nx, nz){
  // Bord du plateau circulaire
  const dist0 = Math.sqrt(nx*nx + nz*nz);
  const maxR = BOARD_R - 0.22;
  if(dist0 > maxR){
    const n0x = nx/dist0, n0z = nz/dist0;
    nx = n0x * maxR; nz = n0z * maxR;
    const vDotN = vx*n0x + vz*n0z;
    if(vDotN > 0){ vx -= vDotN*n0x*1.2; vz -= vDotN*n0z*1.2; }
  }

  // Collision segment par segment
  for(const {cx, cz, ry, hw, hd} of WALL_SEGS){
    const ddx = nx - cx, ddz = nz - cz;
    // Matrice de rotation inverse : passage en repère local du segment
    const cosR =  Math.cos(ry), sinR = Math.sin(ry);
    // Repère local : lx = axe longitudinal, lz = axe normal
    const lx =  cosR*ddx + sinR*ddz;
    const lz = -sinR*ddx + cosR*ddz;
    const ex = hw + BALL_R, ez = hd + BALL_R;
    if(Math.abs(lx) < ex && Math.abs(lz) < ez){
      const ox = ex - Math.abs(lx), oz = ez - Math.abs(lz);
      // Vitesse en repère local
      const vl_x =  cosR*vx + sinR*vz;
      const vl_z = -sinR*vx + cosR*vz;
      if(ox < oz){
        // Résoudre pénétration selon X local (axe longitudinal)
        const sign = lx < 0 ? -1 : 1;
        const plx = lx + sign*ox;   // position corrigée en local
        // Repasser en monde
        nx = cx + cosR*plx - sinR*lz;
        nz = cz + sinR*plx + cosR*lz;
        // Rebond : inverser composante X locale avec amortissement
        const vl_x2 = -vl_x * 0.25;
        vx = cosR*vl_x2 - sinR*vl_z;
        vz = sinR*vl_x2 + cosR*vl_z;
      } else {
        // Résoudre pénétration selon Z local (axe normal)
        const sign = lz < 0 ? -1 : 1;
        const plz = lz + sign*oz;
        nx = cx + cosR*lx - sinR*plz;
        nz = cz + sinR*lx + cosR*plz;
        // Rebond : inverser composante Z locale avec amortissement
        const vl_z2 = -vl_z * 0.25;
        vx = cosR*vl_x - sinR*vl_z2;
        vz = sinR*vl_x + cosR*vl_z2;
      }
    }
  }

  return [nx, nz];
}

function fmt(ms){
  const s=Math.floor(ms/1000), m=Math.floor(s/60);
  return String(m).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}

// ─── DÉMARRAGE ────────────────────────────────────────────────────────────────
function startGame(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('wo').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('tilt-indicator').style.display='block';
  running=true; won=false; startTime=Date.now();
  bx=START_X; bz=START_Z; vx=0; vz=0; tTiltX=0; tTiltZ=0; tiltX=0; tiltZ=0;
  gyroActive=false;
  ball.position.set(bx, BALL_Y, bz);
  if(gyroGranted && !gyroListenerAttached) attachGyroListener();
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('restart-btn').addEventListener('click', startGame);

// ─── BOUCLE ───────────────────────────────────────────────────────────────────
let frame=0;
function animate(){
  requestAnimationFrame(animate);
  frame++;
  if(running && !won){
    // Lissage rapide (0.25 au lieu de 0.1 pour réduire le lag)
    tiltX += (tTiltX - tiltX) * 0.25;
    tiltZ += (tTiltZ - tiltZ) * 0.25;
    boardGroup.rotation.x = tiltX;
    boardGroup.rotation.z = tiltZ;

    // Substeps : évite le tunneling à grande vitesse
    const STEPS = 5;
    const MAX_V = 0.12;
    const spd = Math.sqrt(vx*vx+vz*vz);
    if(spd > MAX_V){ vx = vx/spd*MAX_V; vz = vz/spd*MAX_V; }
    for(let s=0; s<STEPS; s++){
      // rotation.z (inclinaison gauche/droite) → force sur X
      // rotation.x (inclinaison avant/arrière) → force sur Z, signe négatif car axe X "monte" = balle recule
      vx +=  Math.sin(tiltZ) * 0.020 / STEPS;
      vz += -Math.sin(tiltX) * 0.020 / STEPS;
      let nx = bx + vx/STEPS, nz = bz + vz/STEPS;
      [nx,nz] = collide(nx, nz);
      bx=nx; bz=nz;
    }
    vx *= 0.978; vz *= 0.978;

    ball.position.set(bx, BALL_Y, bz);
    ballLight.position.set(bx, BALL_Y+0.3, bz);

    if(bx*bx + bz*bz < 0.25*0.25){
      won=true; running=false;
      document.getElementById('wo').style.display='flex';
      document.getElementById('win-time').textContent='Temps : '+fmt(Date.now()-startTime);
      document.getElementById('hud').style.display='none';
      document.getElementById('tilt-indicator').style.display='none';
    }

    document.getElementById('timer').textContent = fmt(Date.now()-startTime);
    document.getElementById('hud-tx').textContent = tiltX.toFixed(2);
    document.getElementById('hud-tz').textContent = tiltZ.toFixed(2);
    document.getElementById('hud-gyro').textContent = gyroEnabled ? (gyroActive?'OK ✓':'WAIT') : 'OFF';

    const td = document.getElementById('tilt-dot');
    td.setAttribute('cx', 24+tiltZ*40);
    td.setAttribute('cy', 24+tiltX*40);

    MAT_BALL.emissiveIntensity   = 0.15 + Math.sin(frame*0.1)*0.08;
    MAT_FINISH.emissiveIntensity = 0.25 + Math.sin(frame*0.08)*0.15;
    MAT_START.emissiveIntensity  = 0.20 + Math.sin(frame*0.06)*0.10;
  }
  renderer.render(scene, camera);
}
animate();
</script>
